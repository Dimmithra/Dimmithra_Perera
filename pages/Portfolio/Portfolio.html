    /* ══════════════════════════════
       ICON PLACEHOLDER COLORS
    ══════════════════════════════ */
    const iconColors = [
      { bg: "rgba(59,130,246,0.12)", border: "rgba(59,130,246,0.3)", color: "#60a5fa" },
      { bg: "rgba(34,211,238,0.10)", border: "rgba(34,211,238,0.3)", color: "#22d3ee" },
      { bg: "rgba(99,102,241,0.12)", border: "rgba(99,102,241,0.3)", color: "#a5b4fc" },

      { bg: "rgba(74,222,128,0.10)", border: "rgba(74,222,128,0.25)", color: "#86efac" },
      { bg: "rgba(251,191,36,0.10)", border: "rgba(251,191,36,0.25)", color: "#fde68a" },
    ];

    /* ══════════════════════════════
       CREATE CARD
    ══════════════════════════════ */
    function createCard(item, index) {
      const col = iconColors[index % iconColors.length];
      const hasImage = item.image && item.image.trim() !== "";

      const tagsHTML = item.technology
        .map(t => `<span class="tech-tag">${t}</span>`)
        .join("");

      // Build link buttons — only show if URL exists
      const githubBtn = item.github
        ? `<a class="card-link-btn" href="${item.github}" target="_blank" rel="noopener" title="View on GitHub">
             <i class="fa-brands fa-github"></i> GitHub
           </a>`
        : "";
      const liveBtn = item.live
        ? `<a class="card-link-btn card-link-live" href="${item.live}" target="_blank" rel="noopener" title="Live Demo">
             <i class="fa-solid fa-arrow-up-right-from-square"></i> Live Demo
           </a>`
        : "";
      const linksHTML = (githubBtn || liveBtn)
        ? `<div class="card-links">${githubBtn}${liveBtn}</div>`
        : "";

      const card = document.createElement("div");
      card.className = "portfolio-card";
      card.setAttribute("data-category", item.category);
      card.style.animationDelay = `${index * 0.08}s`;

      card.innerHTML = `
        <div class="card-media">
          ${hasImage
          ? `<img src="${item.image}" alt="${item.name}" class="card-img" onerror="this.parentElement.classList.add('img-error'); this.remove();"/>`
          : ""}
          <div class="card-placeholder" style="background:${col.bg}; border-color:${col.border}; ${hasImage ? "display:none" : ""}">
            <i class="${item.icon}" style="color:${col.color}"></i>
          </div>
          <div class="card-cat-badge">${item.category}</div>
        </div>
        <div class="card-body">
          <h3 class="card-title">${item.name}</h3>
          <p class="card-desc">${item.description}</p>
          <div class="tech-row">${tagsHTML}</div>
          ${linksHTML}
        </div>
      `;

      const img = card.querySelector(".card-img");
      if (img) {
        img.addEventListener("error", () => {
          img.remove();
          card.querySelector(".card-placeholder").style.display = "flex";
        });
      }

      return card;
    }

    /* ══════════════════════════════
       LOAD & FILTER
    ══════════════════════════════ */
    function loadPortfolio(filter = "all") {
      const container = document.getElementById("portfolioContainer");
      container.innerHTML = "";

      const filtered = filter === "all"
        ? portfolioItems
        : portfolioItems.filter(i => i.category === filter);

      filtered.forEach((item, i) => {
        const card = createCard(item, i);
        container.appendChild(card);
        // trigger animation
        requestAnimationFrame(() => card.classList.add("visible"));
      });
    }

    // Filter buttons
    document.getElementById("filterRow").addEventListener("click", (e) => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadPortfolio(btn.dataset.filter);
    });

    window.onload = () => loadPortfolio();

    /* ══════════════════════════════
       MOBILE NAV
    ══════════════════════════════ */
    function toggleMenu() {
      document.getElementById("mobileMenu").classList.toggle("open");
      document.getElementById("hamburger").classList.toggle("open");
    }
    function closeMenu() {
      document.getElementById("mobileMenu").classList.remove("open");
      document.getElementById("hamburger").classList.remove("open");
    }
    document.addEventListener("click", (e) => {
      const m = document.getElementById("mobileMenu");
      const h = document.getElementById("hamburger");
      if (!m.contains(e.target) && !h.contains(e.target)) {
        m.classList.remove("open");
        h.classList.remove("open");
      }
    });
